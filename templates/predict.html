<!DOCTYPE html>
<html>
<head>

<title>Traffic Input</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center">Network Traffic Input</h2>

<form action="/result" method="post">

<div class="row">

<div class="col-md-6">

<label>Duration</label>
<input type="number" name="duration" class="form-control">

<label>Protocol Type</label>
<input type="number" name="protocol" class="form-control">

<label>Service</label>
<input type="number" name="service" class="form-control">

</div>

<div class="col-md-6">

<label>Flag</label>
<input type="number" name="flag" class="form-control">

<label>Source Bytes</label>
<input type="number" name="src_bytes" class="form-control">

<label>Destination Bytes</label>
<input type="number" name="dst_bytes" class="form-control">

</div>

</div>

<br>

<button class="btn btn-primary w-100">Detect Attack</button>

</form>

</div>

</body>
</html>
